name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test tests/AbsCli.Tests/AbsCli.Tests.csproj

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        run: dotnet publish src/AbsCli/AbsCli.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishAot=true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: abs-cli-${{ matrix.rid }}
          path: src/AbsCli/bin/Release/net8.0/${{ matrix.rid }}/publish/

  integration-test:
    needs: test
    runs-on: ubuntu-latest
    services:
      audiobookshelf:
        image: advplyr/audiobookshelf:2.33.1
        ports:
          - 13378:80
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Wait for ABS
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:13378/healthcheck && break
            sleep 1
          done
      - name: Seed test data
        run: bash docker/seed.sh
        env:
          ABS_URL: http://localhost:13378
      - name: Run integration tests
        run: dotnet test tests/AbsCli.Tests/AbsCli.Tests.csproj --filter "Category=Integration"
        env:
          ABS_URL: http://localhost:13378
